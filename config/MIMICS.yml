Tao_MOD1: 1

# ---- Physical / chemical protection ----
fPHYS_coeff: [0.3, 0.2]
fPHYS_exp: [1.3, 0.8]

fCHEM_coeff: [0.1, 0.3]
fCHEM_exp: [3.0, 3.0]

# ---- Desorption ----
desorb_coeff: !!float 1.5e-5
desorb_exp: 1.5

# ---- Texture scalars ----
k_texture: 2.0
a_texture: 2.0

cMAX: 1.4
cMIN: 1.2

# ---- Modifiers ----
MOD1: [10, 2, 10, 3, 3, 2]

# MOD2 uses pSCALAR → computed in R
MOD2_base: [8, 2, -1000000, 2, 4, -1000000]

KO: [4, 4]
