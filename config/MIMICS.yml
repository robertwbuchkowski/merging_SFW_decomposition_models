# ---- Temperature dependence of kinetics ----
Vslope: [0.063, 0.063, 0.063, 0.063, 0.063, 0.063]
Vint: 5.47
aV: !!float 8.0e-6

Kslope:
  - 0.017   # META LIT → MIC_1
  - 0.027   # STRU LIT → MIC_1
  - 0.017   # AVAI SOM → MIC_1
  - 0.017   # META LIT → MIC_2
  - 0.027   # STRU LIT → MIC_2
  - 0.017   # AVAI SOM → MIC_2
Kint: 3.19
aK: 10

# ---- Input partitioning ----
FI0: [0.02, 0.3, 4]

# ---- Carbon use efficiency ----
CUE: [0.55, 0.25, 0.75, 0.35]

# ---- Turnover / microbial mortality ----
