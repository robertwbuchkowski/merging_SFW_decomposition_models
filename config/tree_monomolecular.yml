# ------------------------------------------------------------
# Monomolecular tree biomass forcing model
# ------------------------------------------------------------

# ---- Initial conditions ----
B0: 0         # Initial tree biomass
t0: 0           # Stand initiation offset (yr)

# ---- Growth parameters ----
TBTmax: 10000     # Maximum total tree biomass
k_monomol: 0.014 # Monomolecular growth rate (1/yr)
TBHmax: 1000
addherb: 0

# ---- Biomass allocation (must sum to 1) ----
a_leaf: 0.075
a_wood: 0.675
a_root: 0.25

# Herbaceous root fraction
a_root_herb: 0.5

# ---- Turnover and flux rates ----
k_litterfall_ann: 0.35
k_litterfall_herb_ann: 1

k_mort_leaf: 0.00005479    # 0.02/365
k_mort_wood: 0.00006849    # 0.025/365
k_mort_root: 0.00021918   # 0.08/365
k_exudate: 0.00002740     # 0.01/365

# ---- Optional removals (set to zero if unused) ----
leaf_harvest: 0
wood_harvest: 0
root_harvest: 0

herbivory_leaf: 0
herbivory_wood: 0
herbivory_root: 0
